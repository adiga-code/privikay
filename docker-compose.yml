services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: privykai_bot
    restart: unless-stopped

    env_file:
      - .env

    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

    deploy:
      resources:
        limits:
          memory: 256M
